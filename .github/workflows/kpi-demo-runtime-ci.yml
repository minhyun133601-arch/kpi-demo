name: KPI Demo Runtime CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  verify-and-test:
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
        working-directory: ./kpi-runtime/internal-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./kpi-runtime/internal-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Verify server structure
        run: npm run verify:server-structure

      - name: Run node:test suite
        run: npm test

  browser-smoke:
    needs: verify-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: ./kpi-runtime/internal-server
    env:
      KPI_AUTH_ENABLED: "false"
      KPI_LOGIN_ENABLED: "false"
      KPI_SERVER_PORT: "3192"
      KPI_BASE_URL: "http://127.0.0.1:3192"
      KPI_DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5400/postgres"
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5400:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./kpi-runtime/internal-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npm run smoke:kpi-browser:install

      - name: Verify Xvfb availability for headed browser smoke
        run: command -v xvfb-run

      - name: Start KPI Demo runtime (open mode)
        run: |
          nohup npm run start >/tmp/kpi-demo-runtime-3192.stdout.log 2>/tmp/kpi-demo-runtime-3192.stderr.log &
          echo $! >/tmp/kpi-demo-runtime-3192.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3192/api/bootstrap/status; then
              exit 0
            fi
            sleep 2
          done
          echo "KPI Demo runtime failed to become ready on 3192"
          cat /tmp/kpi-demo-runtime-3192.stdout.log || true
          cat /tmp/kpi-demo-runtime-3192.stderr.log || true
          exit 1

      - name: Verify KPI root static surface (open mode)
        run: npm run smoke:kpi-root

      - name: Run Playwright browser smoke (open mode)
        run: npm run smoke:kpi-browser

      - name: Run Playwright browser smoke headed (open mode)
        run: xvfb-run -a npm run smoke:kpi-browser:headed

      - name: Dump KPI Demo runtime logs on failure
        if: failure()
        run: |
          cat /tmp/kpi-demo-runtime-3192.stdout.log || true
          cat /tmp/kpi-demo-runtime-3192.stderr.log || true

      - name: Stop KPI Demo runtime
        if: always()
        run: |
          if [ -f /tmp/kpi-demo-runtime-3192.pid ]; then
            kill "$(cat /tmp/kpi-demo-runtime-3192.pid)" || true
          fi
          pkill -f "node src/server.js" || true
