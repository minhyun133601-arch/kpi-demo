    <!-- 1. Dashboard -->
    <div id="dashboard">
        <div class="dashboard-shell">
            <aside class="dashboard-side">
                <div class="dashboard-side-brand">
                    <span class="dashboard-version-badge">V454</span>
                </div>
                <div id="dashboard-side-nav" class="dashboard-side-nav">
                    <!-- Navigation is rendered by JS. -->
                </div>
                <div class="dashboard-side-footer">
                    <div id="dashboard-auth-bar" class="runtime-auth-bar" hidden>
                        <div class="runtime-auth-segment runtime-auth-segment-main">
                            <span class="runtime-auth-caption">현재 로그인</span>
                            <strong id="dashboard-auth-identity" class="runtime-auth-identity">-</strong>
                        </div>
                        <div id="dashboard-auth-meta" class="runtime-auth-segment runtime-auth-meta" hidden>
                            <span id="dashboard-auth-role" class="runtime-auth-chip runtime-auth-role" hidden></span>
                            <span id="dashboard-auth-id" class="runtime-auth-chip runtime-auth-id" hidden></span>
                        </div>
                        <button id="dashboard-auth-logout" type="button" class="runtime-auth-logout" title="로그아웃" aria-label="로그아웃">
                            <i class="fas fa-right-from-bracket" aria-hidden="true"></i>
                            <span class="runtime-auth-logout-label">로그아웃</span>
                        </button>
                    </div>
                    <div id="last-modified-text" class="dashboard-side-meta">최종 수정: -</div>
                </div>
            </aside>

            <section class="dashboard-main">
                <div class="dashboard-stage">
                    <div class="dashboard-stage-head">
                        <h1 id="dashboard-stage-title" class="dashboard-stage-title">Utility</h1>
                        <span id="dashboard-stage-count" class="dashboard-stage-count">0 items</span>
                    </div>
                    <div id="dashboard-subtabs" class="dashboard-subtabs">
                        <!-- Selected module subtabs are rendered by JS. -->
                    </div>

                    <div id="dashboard-home-panels" class="dashboard-home-panels">
                        <!-- Dashboard panels are rendered by JS. -->
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- 2. Detail viewer -->
    <div id="viewer">
        <header class="viewer-header">
            <div class="viewer-header-leading">
                <span class="viewer-header-brand-badge" aria-hidden="true"><i class="fas fa-clipboard-list"></i></span>
                <span class="viewer-header-brand-text">KPI Demo Management Console</span>
                <span class="viewer-version-badge">V454</span>
            </div>
            <div class="viewer-header-actions">
                <div id="global-save-dock" class="global-save-dock" aria-live="polite">
                    <span id="global-save-status" class="global-save-status">현재 화면은 저장 대상이 없습니다.</span>
                    <div id="viewer-auth-bar" class="runtime-auth-bar" hidden>
                        <div class="runtime-auth-segment runtime-auth-segment-main">
                            <span class="runtime-auth-caption">현재 로그인</span>
                            <strong id="viewer-auth-identity" class="runtime-auth-identity">-</strong>
                        </div>
                        <div id="viewer-auth-meta" class="runtime-auth-segment runtime-auth-meta" hidden>
                            <span id="viewer-auth-role" class="runtime-auth-chip runtime-auth-role" hidden></span>
                            <span id="viewer-auth-id" class="runtime-auth-chip runtime-auth-id" hidden></span>
                        </div>
                        <button id="viewer-auth-logout" type="button" class="runtime-auth-logout" title="로그아웃" aria-label="로그아웃">
                            <i class="fas fa-right-from-bracket" aria-hidden="true"></i>
                            <span class="runtime-auth-logout-label">로그아웃</span>
                        </button>
                    </div>
                    <span id="global-save-recent-chip" class="global-save-date-chip">
                        <span class="label">최근 수정</span>
                        <span id="global-save-recent-value" class="value">-</span>
                    </span>
                    <span id="global-save-date-chip" class="global-save-date-chip is-hidden">
                        <span class="label">오늘 날짜</span>
                        <span id="global-save-date-value" class="value">-</span>
                    </span>
                    <button id="global-save-button" type="button" class="global-save-button" disabled>
                        <i class="fas fa-floppy-disk"></i>
                        <span id="global-save-button-label">저장</span>
                    </button>
                </div>
            </div>
        </header>

        <div id="viewer-body" class="viewer-body">
            <!-- Left sidebar categories -->
            <nav id="sidebar" class="sidebar custom-scroll">
                <!-- List is injected by JS. -->
            </nav>

            <!-- Main content -->
            <main id="main-scroll" class="content-area custom-scroll">
                <div id="content-container" class="content-card">
                    <!-- Content is injected by JS. -->
                </div>
            </main>
        </div>
    </div>
